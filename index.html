      margin: 40px auto;
      line-height: 1.6;
      padding: 0 20px;
    }

    /* Target the list container to remove default bullets if desired */
    ul {
      list-style-type: none; /* Removes the bullet points */
      padding-left: 0;       /* Removes the default left indent */
    }

    /* Space out the individual list items vertically */
    li {
      margin-bottom: 10px;
    }

    /* Force all links inside the list to be white */
    ul a {
      color: white;
      text-decoration: underline; /* Keeps the underline so people know they are clickable */
    }

    /* Optional: Slightly change the link color on hover so it feels responsive */
    ul a:hover {
      color: #dddddd;
    }
  </style>
